name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least privilege by default; only the release job opts into write.
permissions:
  contents: read

# One run per ref; newer pushes cancel in-flight builds.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Apple-Silicon runner so the produced .app/.dmg is arm64, matching local builds.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5.4.2
        with:
          enable-cache: true

      - name: "Sync dependencies (incl. dev group: pytest, pyinstaller)"
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Build .app and .dmg
        run: bash packaging/build_dmg.sh

      - name: Upload .dmg as build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: Ratebar-dmg
          path: packaging/dist/Ratebar.dmg
          if-no-files-found: error

  # On a version tag (v*) only: attach the built .dmg to the GitHub Release.
  # This is the sole job granted contents:write.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built .dmg
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: Ratebar-dmg

      - name: Attach .dmg to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: Ratebar.dmg
