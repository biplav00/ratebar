name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Allow the tag job to publish release assets.
permissions:
  contents: write

# One run per ref; newer pushes cancel in-flight builds.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Apple-Silicon runner so the produced .app/.dmg is arm64, matching local builds.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: "Sync dependencies (incl. dev group: pytest, pyinstaller)"
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Build .app and .dmg
        run: bash packaging/build_dmg.sh

      - name: Upload .dmg as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratebar-dmg
          path: packaging/dist/ratebar.dmg
          if-no-files-found: error

      # On a version tag (v*), also attach the .dmg to the GitHub Release.
      - name: Attach .dmg to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/ratebar.dmg
